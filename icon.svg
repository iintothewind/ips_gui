<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Photo frame body -->
  <rect x="1" y="2" width="42" height="34" rx="5" fill="#1e40af"/>

  <!-- Photo inner area (sky) -->
  <rect x="4" y="5" width="36" height="28" rx="3" fill="#93c5fd"/>

  <!-- Clip mountains/sun to the inner photo area -->
  <clipPath id="photo-clip">
    <rect x="4" y="5" width="36" height="28" rx="3"/>
  </clipPath>

  <!-- Mountain silhouette -->
  <polygon
    points="4,33 14,17 24,25 32,15 40,33"
    fill="#15803d"
    clip-path="url(#photo-clip)"/>

  <!-- Sun -->
  <circle cx="34" cy="12" r="4.5" fill="#fbbf24" clip-path="url(#photo-clip)"/>

  <!-- Magnifying glass lens (overlaps bottom-right corner of frame) -->
  <circle cx="46" cy="46" r="15"
    fill="white" fill-opacity="0.92"
    stroke="#1e293b" stroke-width="4.5"/>

  <!-- Magnifying glass handle -->
  <line x1="57" y1="57" x2="62" y2="62"
    stroke="#1e293b" stroke-width="5.5" stroke-linecap="round"/>
</svg>
